<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Практика — Татьяна Наумкина</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- НАВИГАЦИЯ -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">
        Татьяна <em>Наумкина</em>
      </a>
      <a href="library.html" class="nav__back">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Все практики
      </a>
    </div>
  </nav>

  <main>
    <div class="container">

      <div id="practiceContent" style="padding-top:96px;padding-bottom:60px;">
        <!-- Заполняется JS -->
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <p class="footer__disclaimer">
          *Материалы носят информационно-образовательный характер
          и не являются заменой профессиональной психологической помощи.
        </p>
        <p class="footer__copy">© 2025 Татьяна Наумкина</p>
      </div>
    </div>
  </footer>

  <script src="data.js"></script>
  <script>
    const DIR_LABELS = {
      contact:    'Разрешение',
      resilience: 'Тревога',
      self:       'Самоценность',
      relations:  'Отношения'
    };

    const DIR_ICONS = {
      contact:    '🎯',
      resilience: '🌿',
      self:       '💎',
      relations:  '🤝'
    };

    // ============================================================
    //  РЕНДЕР
    // ============================================================
    function render() {
      const id = new URLSearchParams(window.location.search).get('id');
      const practice = getPracticeById(id);

      if (!practice) {
        window.location.href = 'library.html';
        return;
      }

      // Обновляем title страницы
      document.title = `${practice.title} — Татьяна Наумкина`;

      const stepsHTML = practice.steps
        .map(s => `<li>${s}</li>`)
        .join('');

      const wrap = document.getElementById('practiceContent');
      wrap.innerHTML = `

        <!-- ТЕГ + ЗАГОЛОВОК -->
        <div style="margin-bottom:28px;" class="fade-in">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
            <span class="pill pill--${practice.direction}">
              ${DIR_ICONS[practice.direction]} ${DIR_LABELS[practice.direction]}
            </span>
            <span style="font-size:.8rem;color:var(--muted);font-weight:300;display:flex;align-items:center;gap:5px;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                   stroke="var(--accent)" stroke-width="2">
                <circle cx="12" cy="12" r="9"/>
                <polyline points="12 7 12 12 15 15"/>
              </svg>
              ${practice.duration}
            </span>
          </div>

          <h1 style="margin-bottom:10px;">${practice.title}</h1>
          <p style="font-size:1.05rem;color:var(--muted);font-weight:300;line-height:1.7;">
            ${practice.tagline}
          </p>
        </div>

        <!-- ЗАЧЕМ ЭТО ТЕБЕ -->
        <div class="practice-section fade-in">
          <div class="practice-section__label">Зачем это тебе</div>
          <p class="practice-section__text">${practice.why}</p>
        </div>

        <!-- КАК ВЫПОЛНЯТЬ -->
        <div class="practice-section fade-in">
          <div class="practice-section__label">Как выполнять</div>
          <ol class="steps-list">
            ${stepsHTML}
          </ol>
        </div>

        <!-- ОБРАТИ ВНИМАНИЕ -->
        <div class="practice-note fade-in">
          ${practice.note}
        </div>

        <!-- КНОПКА НАЗАД -->
        <div class="fade-in" style="margin-bottom:40px;">
          <a href="library.html" class="btn btn--outline">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <line x1="19" y1="12" x2="5" y2="12"/>
              <polyline points="12 19 5 12 12 5"/>
            </svg>
            Все практики
          </a>
        </div>

        <!-- CTA БЛОК -->
        <div class="session-block fade-in" style="margin-bottom:20px;">
          <span class="session-block__eyebrow">Хочу разобраться в своей ситуации</span>
          <h2 class="session-block__title">Первая сессия — персональный разбор</h2>
          <p class="session-block__time"><span class="time-accent">55 минут</span> · <span class="time-accent">7 000 рублей</span></p>
          <a href="https://forms.yandex.ru/u/6a2276a31f1eb5ab4da837c9"
             target="_blank" rel="noopener"
             class="btn btn--ghost">
            Записаться на первую сессию
          </a>
          <p class="session-block__disclaimer">
            *Материалы библиотеки носят информационно-образовательный характер
            и не являются заменой профессиональной психологической помощи
          </p>
        </div>

      `;

      // Анимации
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });

      // Первые элементы сразу
      wrap.querySelectorAll('.fade-in').forEach((el, i) => {
        setTimeout(() => {
          el.classList.add('visible');
        }, i * 80);
      });
    }

    render();
  </script>

</body>
</html>
